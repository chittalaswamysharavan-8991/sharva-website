    <script>
      (function () {
        var canonicalHost = "pablo-cockpit.vercel.app";
        var legacyHosts = ["lifeos-dashboard-ecru-five.vercel.app"];
        if (legacyHosts.indexOf(window.location.hostname) !== -1) {
          var nextUrl =
            window.location.protocol +
            "//" +
            canonicalHost +
            window.location.pathname +
            window.location.search +
            window.location.hash;
          window.location.replace(nextUrl);
        }
      })();
    </script>
